# ═══════════════════════════════════════════════════════════════════════════════
# GRUDGE STUDIO — Local Account Infrastructure
# Runs: MySQL, Redis, grudge-id, account-api, wallet-service
# VPS keeps: game-api, ai-agent, asset-service, ws-service, headless
# Exposed via Cloudflare Tunnel (no port forwarding needed)
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  grudge-local:
    driver: bridge

volumes:
  mysql-local-data:
  redis-local-data:

services:

  # ─── MySQL (local, same schema as VPS) ─────────────────────────
  mysql:
    image: mysql:8.0
    container_name: grudge-mysql-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-local-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - grudge-local

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grudge-redis-local
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-local-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grudge-local

  # ─── GRUDGE ID — Auth & Identity ───────────────────────────────
  grudge-id:
    build: ./services/grudge-id
    container_name: grudge-id-local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_VERIFY_SID: ${TWILIO_VERIFY_SID}
      WEB3AUTH_CLIENT_ID: ${WEB3AUTH_CLIENT_ID}
      WALLET_SERVICE_URL: http://wallet-service:3002
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      CF_TURNSTILE_SECRET_KEY: ${CF_TURNSTILE_SECRET_KEY}
      CF_TURNSTILE_SITE_KEY: ${CF_TURNSTILE_SITE_KEY}
      DEFAULT_AUTH_REDIRECT: ${DEFAULT_AUTH_REDIRECT:-https://grudgewarlords.com/auth}
      RESEND_API_KEY: ${RESEND_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grudge-local

  # ─── WALLET SERVICE ────────────────────────────────────────────
  wallet-service:
    build:
      context: ./services
      dockerfile: wallet-service/Dockerfile
      target: production
    container_name: wallet-service-local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      WALLET_MASTER_SEED: ${WALLET_MASTER_SEED}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      PHANTOM_ORGANIZATION_ID: ${PHANTOM_ORGANIZATION_ID}
      PHANTOM_APP_ID: ${PHANTOM_APP_ID}
      PHANTOM_API_PRIVATE_KEY: ${PHANTOM_API_PRIVATE_KEY}
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grudge-local

  # ─── ACCOUNT API ───────────────────────────────────────────────
  account-api:
    build:
      context: ./services
      dockerfile: account-api/Dockerfile
      target: production
    container_name: account-api-local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_KEY: ${OBJECT_STORAGE_KEY}
      OBJECT_STORAGE_SECRET: ${OBJECT_STORAGE_SECRET}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-auto}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "3005:3005"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grudge-local
