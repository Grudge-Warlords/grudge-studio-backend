# ═══════════════════════════════════════════════════════════════
# Grudge Studio — Local Network Overlay
# Exposes backend services on host ports for LAN dev access.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# From GrudgeYonko (or any LAN machine):
#   curl http://10.0.0.217:3003/health   # game-api
#   curl http://10.0.0.217:3001/health   # grudge-id
#
# NOTE: Do NOT use this on production VPS — use docker-compose.prod.yml instead.
# ═══════════════════════════════════════════════════════════════

services:

  # ── Identity / Auth ────────────────────────────────────────
  grudge-id:
    ports:
      - "3001:3001"

  # ── Wallet (exposed for local debug only) ──────────────────
  wallet-service:
    ports:
      - "3002:3002"

  # ── Game API ───────────────────────────────────────────────
  game-api:
    ports:
      - "3003:3003"

  # ── AI Agent (exposed for local debug only) ────────────────
  ai-agent:
    ports:
      - "3004:3004"

  # ── Account API ────────────────────────────────────────────
  account-api:
    ports:
      - "3005:3005"

  # ── Launcher API ───────────────────────────────────────────
  launcher-api:
    ports:
      - "3006:3006"

  # ── WebSocket ──────────────────────────────────────────────
  ws-service:
    ports:
      - "3007:3007"

  # ── Asset Service ──────────────────────────────────────────
  asset-service:
    ports:
      - "3008:3008"

  # ── MySQL (dev access — query directly from GrudgeYonko) ───
  mysql:
    ports:
      - "3306:3306"

  # ── Redis (dev access) ─────────────────────────────────────
  redis:
    ports:
      - "6379:6379"

  # ── Uptime Kuma (status dashboard on LAN) ──────────────────
  uptime-kuma:
    ports:
      - "3009:3001"
