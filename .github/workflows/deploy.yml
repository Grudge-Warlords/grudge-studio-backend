name: Deploy to Grudge Studio VPS

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to rebuild (or 'all')"
        default: "all"
        required: false
      deploy_headless:
        description: "Also deploy the Unity headless game server"
        type: boolean
        default: false
        required: falseh

concurrency:
  group: deploy-main
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  # ── Pre-deploy: lint & syntax-check all services ──────────────
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & lint ai-agent
        working-directory: services/ai-agent
        run: |
          npm install --ignore-scripts
          node -e "require('./src/index.js')" 2>&1 | head -5 && echo 'Syntax OK' || exit 1
      - name: Syntax-check all services
        run: |
          FAIL=0
          for svc in grudge-id wallet-service game-api ai-agent account-api launcher-api asset-service ws-service; do
            DIR="services/$svc"
            if [ -f "$DIR/package.json" ]; then
              MAIN=$(node -e "console.log(require('./$DIR/package.json').main || 'src/index.js')")
              if node --check "$DIR/$MAIN" 2>/dev/null; then
                echo "  ✅ $svc"
              else
                echo "  ❌ $svc syntax error"
                FAIL=$((FAIL+1))
              fi
            fi
          done
          [ $FAIL -eq 0 ] || exit 1

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ───────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. SSH setup ──────────────────────────
      - name: Setup SSH
        id: setup_ssh
        run: |
          mkdir -p ~/.ssh
          KEY_RAW='${{ secrets.DEPLOY_SSH_KEY }}'
          VALID=0

          # Method 1: raw multiline secret
          printf "%s" "$KEY_RAW" | tr -d '\r' > ~/.ssh/deploy_key
          if ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            VALID=1
          fi

          # Method 2: escaped newlines (\n)
          if [ $VALID -eq 0 ]; then
            printf "%b" "$KEY_RAW" | tr -d '\r' > ~/.ssh/deploy_key
            if ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
              VALID=1
            fi
          fi

          # Method 3: base64-encoded key
          if [ $VALID -eq 0 ]; then
            echo "$KEY_RAW" | tr -d '\r' | base64 -d > ~/.ssh/deploy_key 2>/dev/null || true
            if ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
              VALID=1
            fi
          fi

          if [ $VALID -eq 1 ]; then
            chmod 600 ~/.ssh/deploy_key
            echo "auth_mode=key" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.VPS_PASSWORD }}" ]; then
            sudo apt-get update -y
            sudo apt-get install -y sshpass
            echo "auth_mode=password" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_SSH_KEY invalid and VPS_PASSWORD not set."
            exit 1
          fi
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── 3. Sync code (never sync .env) ────────
      - name: Sync project to VPS
        run: |
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            RSYNC_SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no"
          else
            RSYNC_SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          fi
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='services/grudge-headless/bin/' \
            --exclude='.env' \
            --exclude='*.log' \
            -e "$RSYNC_SSH" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/grudge-studio-backend/

      # ── 4. Run SQL migrations (idempotent) ────
      - name: Run SQL migrations
        run: |
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'bash /opt/grudge-studio-backend/scripts/migrate.sh'
          else
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'bash /opt/grudge-studio-backend/scripts/migrate.sh'
          fi

      # ── 5. Kill orphan compose stacks ─────────
      - name: Enforce single stack
        run: |
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          else
            SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          fi
          echo "Checking for duplicate compose projects..."
          $SSH 'for proj in $(docker compose ls --format json 2>/dev/null | grep -o "\"Name\":\"[^\"]*\"" | sed "s/\"Name\":\"//;s/\"//" || true); do
            if [ "$proj" != "grudge-studio-backend" ]; then
              if docker compose -p "$proj" ps --format json 2>/dev/null | grep -q "grudge\|game-api\|account-api"; then
                echo "  ⚠  Removing orphan stack: $proj"
                docker compose -p "$proj" down --remove-orphans 2>/dev/null || true
              fi
            fi
          done
          echo "  ✓ Single stack enforced"'

      # ── 6. Rolling deploy with per-service health gate ──
      #   For each service:
      #     a) Tag current image as :previous
      #     b) Build + start new container
      #     c) Poll /health — if it fails, rollback to :previous
      - name: Rolling deploy with health gate
        id: deploy
        run: |
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          else
            SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          fi
          BASE="/opt/grudge-studio-backend"
          PROJECT="grudge-studio-backend"
          COMPOSE="docker compose -p $PROJECT -f docker-compose.yml -f docker-compose.prod.yml"
          SERVICES="${{ github.event.inputs.services || 'all' }}"

          if [ "$SERVICES" = "all" ]; then
            REBUILD="ai-agent wallet-service account-api launcher-api asset-service game-api grudge-id ws-service"
          else
            REBUILD=$(echo $SERVICES | tr ',' ' ')
          fi

          FAILED_SVCS=""

          for SVC in $REBUILD; do
            echo "▶ Deploying $SVC"

            # a) Tag current image as :previous for rollback
            $SSH "IMG=\$(docker inspect --format='{{.Config.Image}}' \"$SVC\" 2>/dev/null || true); \
              if [ -n \"\$IMG\" ] && [ \"\$IMG\" != '<no value>' ]; then \
                docker tag \"\$IMG\" \"\${IMG%%:*}:previous\" 2>/dev/null || true; \
                echo '    tagged :previous'; \
              fi"

            # b) Build and start
            $SSH "cd $BASE && \
              DOCKER_BUILDKIT=1 $COMPOSE build --build-arg BUILDKIT_INLINE_CACHE=1 $SVC && \
              $COMPOSE up -d --no-deps $SVC"

            # c) Health gate (6 attempts × 5s = 30s max)
            SVC_HEALTHY=false
            for ATTEMPT in 1 2 3 4 5 6; do
              sleep 5
              if $SSH "curl -sf --max-time 5 http://localhost:\$(docker inspect --format='{{range \$p, \$conf := .NetworkSettings.Ports}}{{(index \$conf 0).HostPort}}{{end}}' $SVC 2>/dev/null || echo 0)/health" > /dev/null 2>&1; then
                SVC_HEALTHY=true
                break
              fi
              # Fallback: check by known port map
              case $SVC in
                grudge-id) PORT=3001;; game-api) PORT=3003;; ai-agent) PORT=3004;;
                account-api) PORT=3005;; launcher-api) PORT=3006;; ws-service) PORT=3007;;
                asset-service) PORT=3008;; *) PORT="";;  esac
              if [ -n "$PORT" ]; then
                if $SSH "curl -sf --max-time 5 http://localhost:$PORT/health" > /dev/null 2>&1; then
                  SVC_HEALTHY=true
                  break
                fi
              fi
              echo "  ⏳ $SVC attempt $ATTEMPT/6 — not healthy yet"
            done

            if [ "$SVC_HEALTHY" = true ]; then
              echo "  ✅ $SVC healthy"
            else
              echo "  ❌ $SVC FAILED — rolling back to :previous"
              $SSH "PREV=\$(docker images --format '{{.Repository}}:{{.Tag}}' | grep \"${SVC}.*:previous\" | head -1); \
                if [ -n \"\$PREV\" ]; then \
                  docker stop $SVC 2>/dev/null || true; \
                  docker rm $SVC 2>/dev/null || true; \
                  docker tag \"\$PREV\" \"\${PREV%%:*}:latest\" 2>/dev/null || true; \
                  cd $BASE && $COMPOSE up -d --no-deps --no-build $SVC; \
                  echo '  ↩ rolled back'; \
                else \
                  cd $BASE && $COMPOSE restart $SVC || true; \
                  echo '  ⚠ no :previous image, restarted current'; \
                fi"
              FAILED_SVCS="$FAILED_SVCS $SVC"
            fi
            echo ""
          done

          # Summary
          if [ -n "$FAILED_SVCS" ]; then
            echo "health_ok=false" >> $GITHUB_OUTPUT
            echo "failed_services=$FAILED_SVCS" >> $GITHUB_OUTPUT
            echo "::error::Services rolled back:$FAILED_SVCS"
          else
            echo "health_ok=true" >> $GITHUB_OUTPUT
            echo "All services deployed and healthy!"
          fi

      # ── 6b. Deploy headless game server (optional) ──
      - name: Deploy headless game server
        if: github.event.inputs.deploy_headless == 'true'
        run: |
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          else
            SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          fi
          echo "▶ Deploying grudge-headless (Unity game server)"
          # Check if binary exists on VPS
          if $SSH "test -f /opt/grudge-studio-backend/services/grudge-headless/bin/GrudgeLinuxServer.x86_64"; then
            $SSH "bash /opt/grudge-studio-backend/scripts/deploy-headless.sh"
          else
            echo "⚠ Skipping headless deploy — binary not uploaded to VPS"
            echo "  Upload first: bash scripts/upload-headless-binary.sh /path/to/build --deploy"
          fi

      # ── 7. Prune and remove orphans ─────────────
      - name: Prune docker
        run: |
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'docker compose -p grudge-studio-backend up -d --remove-orphans 2>/dev/null; docker image prune -f; docker container prune -f'
          else
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'docker compose -p grudge-studio-backend up -d --remove-orphans 2>/dev/null; docker image prune -f; docker container prune -f'
          fi

      # ── 8. Fail the build if any service was rolled back ──
      - name: Check deploy result
        if: steps.deploy.outputs.health_ok == 'false'
        run: |
          echo "Deploy completed with rollbacks for:${{ steps.deploy.outputs.failed_services }}"
          echo "These services are running their PREVIOUS version."
          exit 1

      # ── 8. Discord deploy notification ────────
      - name: Notify Discord (success)
        if: success()
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.DISCORD_SYSTEM_WEBHOOK_TOKEN }}" ]; then
            echo "DISCORD_SYSTEM_WEBHOOK_TOKEN not set; skipping success notification."
            exit 0
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -sf -X POST "${{ secrets.DISCORD_SYSTEM_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Grudge Studio — Deploy Succeeded\",
                \"color\": 4978687,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"[$SHORT_SHA](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"description\": \"${{ github.event.head_commit.message }}\",
                \"footer\": {\"text\": \"VPS: ${{ secrets.VPS_HOST }}\"}
              }]
            }"

      - name: Notify Discord (failure)
        if: failure()
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.DISCORD_SYSTEM_WEBHOOK_TOKEN }}" ]; then
            echo "DISCORD_SYSTEM_WEBHOOK_TOKEN not set; skipping failure notification."
            exit 0
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -sf -X POST "${{ secrets.DISCORD_SYSTEM_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚨 Grudge Studio — Deploy FAILED\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"[$SHORT_SHA](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Actor\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"description\": \"Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"footer\": {\"text\": \"VPS: ${{ secrets.VPS_HOST }}\"}
              }]
            }"
          exit 1
