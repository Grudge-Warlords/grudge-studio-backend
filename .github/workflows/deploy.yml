name: Deploy to Grudge Studio VPS

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to rebuild (or 'all')"
        default: "all"
        required: false

concurrency:
  group: deploy-main
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  # ── Pre-deploy: lint & syntax-check all services ──────────────
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & lint ai-agent
        working-directory: services/ai-agent
        run: |
          npm ci --ignore-scripts
          node -e "require('./src/index.js')" 2>&1 | head -5 && echo 'Syntax OK' || exit 1
      - name: Syntax-check all services
        run: |
          FAIL=0
          for svc in grudge-id wallet-service game-api ai-agent account-api launcher-api asset-service ws-service; do
            DIR="services/$svc"
            if [ -f "$DIR/package.json" ]; then
              MAIN=$(node -e "console.log(require('./$DIR/package.json').main || 'src/index.js')")
              if node --check "$DIR/$MAIN" 2>/dev/null; then
                echo "  ✅ $svc"
              else
                echo "  ❌ $svc syntax error"
                FAIL=$((FAIL+1))
              fi
            fi
          done
          [ $FAIL -eq 0 ] || exit 1

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ───────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. SSH setup ──────────────────────────
      - name: Setup SSH
        id: setup_ssh
        run: |
          mkdir -p ~/.ssh
          KEY_RAW='${{ secrets.DEPLOY_SSH_KEY }}'
          VALID=0

          # Method 1: raw multiline secret
          printf "%s" "$KEY_RAW" | tr -d '\r' > ~/.ssh/deploy_key
          if ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            VALID=1
          fi

          # Method 2: escaped newlines (\n)
          if [ $VALID -eq 0 ]; then
            printf "%b" "$KEY_RAW" | tr -d '\r' > ~/.ssh/deploy_key
            if ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
              VALID=1
            fi
          fi

          # Method 3: base64-encoded key
          if [ $VALID -eq 0 ]; then
            echo "$KEY_RAW" | tr -d '\r' | base64 -d > ~/.ssh/deploy_key 2>/dev/null || true
            if ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
              VALID=1
            fi
          fi

          if [ $VALID -eq 1 ]; then
            chmod 600 ~/.ssh/deploy_key
            echo "auth_mode=key" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.VPS_PASSWORD }}" ]; then
            sudo apt-get update -y
            sudo apt-get install -y sshpass
            echo "auth_mode=password" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_SSH_KEY invalid and VPS_PASSWORD not set."
            exit 1
          fi
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── 3. Sync code (never sync .env) ────────
      - name: Sync project to VPS
        run: |
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            RSYNC_SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no"
          else
            RSYNC_SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          fi
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='services/grudge-headless/bin/' \
            --exclude='.env' \
            --exclude='*.log' \
            -e "$RSYNC_SSH" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/grudge-studio-backend/

      # ── 4. Run SQL migrations (idempotent) ────
      - name: Run SQL migrations
        run: |
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'bash /opt/grudge-studio-backend/scripts/migrate.sh'
          else
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'bash /opt/grudge-studio-backend/scripts/migrate.sh'
          fi

      # ── 5. Rolling service rebuild ────────────
      #   Order: infrastructure-free → data → api → realtime
      #   Each service is built and restarted independently so
      #   other services stay up during the rolling update.
      - name: Rolling deploy
        run: |
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          else
            SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          fi
          BASE="/opt/grudge-studio-backend"
          SERVICES="${{ github.event.inputs.services || 'all' }}"

          # Decide which services to rebuild
          if [ "$SERVICES" = "all" ]; then
            REBUILD="ai-agent wallet-service account-api launcher-api asset-service game-api grudge-id ws-service"
          else
            REBUILD=$(echo $SERVICES | tr ',' ' ')
          fi

          for SVC in $REBUILD; do
            echo "▶ Building $SVC ..."
            $SSH "cd $BASE && \
              DOCKER_BUILDKIT=1 docker compose build \
                --build-arg BUILDKIT_INLINE_CACHE=1 \
                $SVC && \
              docker compose up -d --no-deps $SVC"
            echo "✓ $SVC restarted"
            sleep 3
          done

      # ── 6. Remove dangling images/containers ──
      - name: Prune docker
        run: |
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'docker image prune -f && docker container prune -f'
          else
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'docker image prune -f && docker container prune -f'
          fi

      # ── 7. Health checks with retry ───────────
      - name: Health check
        id: health
        run: |
          sleep 12
          if [ "${{ steps.setup_ssh.outputs.auth_mode }}" = "password" ]; then
            export SSHPASS="${{ secrets.VPS_PASSWORD }}"
            SSH="sshpass -e ssh -o StrictHostKeyChecking=no -o PubkeyAuthentication=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          else
            SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          fi
          FAIL=0
          declare -A ENDPOINTS=(
            [grudge-id]=3001
            [game-api]=3003
            [ai-agent]=3004
            [account-api]=3005
            [launcher-api]=3006
            [ws-service]=3007
            [asset-service]=3008
          )
          for SVC in "${!ENDPOINTS[@]}"; do
            PORT=${ENDPOINTS[$SVC]}
            for ATTEMPT in 1 2 3; do
              if $SSH "curl -sf http://localhost:$PORT/health" > /dev/null 2>&1; then
                echo "  ✅ $SVC (port $PORT)"
                break
              fi
              if [ $ATTEMPT -eq 3 ]; then
                echo "  ❌ $SVC FAILED after 3 attempts"
                FAIL=$((FAIL+1))
              else
                echo "  ⏳ $SVC attempt $ATTEMPT failed, retrying..."
                sleep 5
              fi
            done
          done
          if [ $FAIL -gt 0 ]; then
            echo "health_ok=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "health_ok=true" >> $GITHUB_OUTPUT
          echo "All services healthy!"

      # ── 8. Discord deploy notification ────────
      - name: Notify Discord (success)
        if: success()
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.DISCORD_SYSTEM_WEBHOOK_TOKEN }}" ]; then
            echo "DISCORD_SYSTEM_WEBHOOK_TOKEN not set; skipping success notification."
            exit 0
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -sf -X POST "${{ secrets.DISCORD_SYSTEM_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Grudge Studio — Deploy Succeeded\",
                \"color\": 4978687,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"[$SHORT_SHA](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"description\": \"${{ github.event.head_commit.message }}\",
                \"footer\": {\"text\": \"VPS: ${{ secrets.VPS_HOST }}\"}
              }]
            }"

      - name: Notify Discord (failure)
        if: failure()
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.DISCORD_SYSTEM_WEBHOOK_TOKEN }}" ]; then
            echo "DISCORD_SYSTEM_WEBHOOK_TOKEN not set; skipping failure notification."
            exit 0
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -sf -X POST "${{ secrets.DISCORD_SYSTEM_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚨 Grudge Studio — Deploy FAILED\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"Commit\", \"value\": \"[$SHORT_SHA](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Actor\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"description\": \"Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"footer\": {\"text\": \"VPS: ${{ secrets.VPS_HOST }}\"}
              }]
            }"
          exit 1
