name: Deploy to Grudge Studio VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Copy files to VPS via SSH ─────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync project to VPS
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='services/grudge-headless/bin/' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/grudge-studio-backend/

      # ── Remote: pull & restart services ──────
      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'cd /opt/grudge-studio-backend && \
               docker compose pull 2>/dev/null || true && \
               docker compose build --no-cache grudge-id wallet-service game-api ai-agent account-api launcher-api && \
               docker compose up -d --remove-orphans && \
               docker system prune -f'

      - name: Health check
        run: |
          sleep 15
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              'curl -sf http://localhost:3001/health && \
               curl -sf http://localhost:3003/health && \
               curl -sf http://localhost:3004/health && \
               curl -sf http://localhost:3005/health && \
               curl -sf http://localhost:3006/health && \
               echo "All services healthy!"'
