name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}

jobs:
  deploy-vps-staging:
    name: Deploy VPS (staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: unnecessary
          config: |
            Host vps
              HostName ${{ secrets.VPS_HOST }}
              User ${{ secrets.VPS_USER }}
              StrictHostKeyChecking no

      - name: Sync files to VPS staging
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='cloudflare' \
            ./ vps:/opt/grudge-studio-backend-staging/

      - name: Start staging containers
        run: |
          ssh vps 'cd /opt/grudge-studio-backend-staging && \
            docker compose -f docker-compose.staging.yml pull && \
            docker compose -f docker-compose.staging.yml up -d --build'

  deploy-workers-staging:
    name: Deploy Workers (staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy dashboard worker (staging)
        working-directory: cloudflare/workers/dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npx wrangler deploy --env staging

      - name: Deploy health-ping worker (staging)
        working-directory: cloudflare/workers/health-ping
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npx wrangler deploy --env staging

      - name: Deploy r2-cdn worker (staging)
        working-directory: cloudflare/workers/r2-cdn
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npx wrangler deploy --env staging
