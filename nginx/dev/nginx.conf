worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # ── Gzip ───────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstreams ──────────────────────────────────────────────
    upstream grudge_id       { server grudge-id:3001; }
    upstream wallet_service  { server wallet-service:3002; }
    upstream game_api        { server game-api:3003; }
    upstream ai_agent        { server ai-agent:3004; }
    upstream account_api     { server account-api:3005; }
    upstream launcher_api    { server launcher-api:3006; }
    upstream ws_service      { server ws-service:3007; }
    upstream asset_service   { server asset-service:3008; }
    upstream uptime_kuma     { server uptime-kuma:3001; }

    # ── CORS map ───────────────────────────────────────────────
    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
        "~^https?://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
        "~^https://(.*\.)?grudgewarlords\.com$" $http_origin;
        "~^https://(.*\.)?grudge-studio\.com$" $http_origin;
        "~^https://(.*\.)?grudgestudio\.com$" $http_origin;
        "~^https://.*\.vercel\.app$" $http_origin;
        "~^https://molochdagod\.github\.io$" $http_origin;
    }

    server {
        listen 8080;
        server_name localhost;

        # ── CORS headers (applied globally) ────────────────────
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Internal-Key" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Root — Gateway Status Page ─────────────────────────
        location = / {
            default_type text/html;
            return 200 '<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><title>Grudge Studio — Local Dev Gateway</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#e0e0e0;font-family:monospace;padding:2rem}
  h1{color:#ff6b35;margin-bottom:.5rem;font-size:1.8rem}
  .sub{color:#888;margin-bottom:2rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
  .card{background:#12121a;border:1px solid #222;border-radius:8px;padding:1.2rem;transition:border-color .2s}
  .card:hover{border-color:#ff6b35}
  .card h3{color:#ff6b35;margin-bottom:.3rem}
  .card .port{color:#666;font-size:.85rem}
  .card a{color:#4fc3f7;text-decoration:none}
  .card a:hover{text-decoration:underline}
  .status{margin-top:2rem;padding:1rem;background:#12121a;border:1px solid #222;border-radius:8px}
  .status a{color:#4fc3f7}
</style></head><body>
<h1>Grudge Studio — Local Dev Gateway</h1>
<p class="sub">All services routed through localhost:8080</p>
<div class="grid">
  <div class="card"><h3>Grudge ID</h3><p class="port">:3001</p><a href="/id/health">/id/*</a> — Auth, Discord, Web3Auth</div>
  <div class="card"><h3>Wallet Service</h3><p class="port">:3002</p><a href="/wallet/health">/wallet/*</a> — Solana, GBUX</div>
  <div class="card"><h3>Game API</h3><p class="port">:3003</p><a href="/api/health">/api/*</a> — Characters, Items, Combat</div>
  <div class="card"><h3>AI Agent</h3><p class="port">:3004</p><a href="/ai/health">/ai/*</a> — Missions, Companions, Factions</div>
  <div class="card"><h3>Account API</h3><p class="port">:3005</p><a href="/account/health">/account/*</a> — Profiles, Social</div>
  <div class="card"><h3>Launcher API</h3><p class="port">:3006</p><a href="/launcher/health">/launcher/*</a> — Versions, Launch Tokens</div>
  <div class="card"><h3>WebSocket</h3><p class="port">:3007</p><a href="/ws/socket.io/">/ws/*</a> — Real-time (Socket.IO)</div>
  <div class="card"><h3>Asset Service</h3><p class="port">:3008</p><a href="/assets/health">/assets/*</a> — Upload, Metadata</div>
</div>
<div class="status"><a href="/status/">Uptime Kuma Status Dashboard →</a></div>
</body></html>';
        }

        # ── Grudge ID (/id/) ───────────────────────────────────
        location /id/ {
            rewrite ^/id/(.*) /$1 break;
            proxy_pass http://grudge_id;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Wallet Service (/wallet/) ─────────────────────────
        location /wallet/ {
            rewrite ^/wallet/(.*) /$1 break;
            proxy_pass http://wallet_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Game API (/api/) ──────────────────────────────────
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://game_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── AI Agent (/ai/) ──────────────────────────────────
        location /ai/ {
            rewrite ^/ai/(.*) /$1 break;
            proxy_pass http://ai_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Account API (/account/) ──────────────────────────
        location /account/ {
            rewrite ^/account/(.*) /$1 break;
            proxy_pass http://account_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Launcher API (/launcher/) ─────────────────────────
        location /launcher/ {
            rewrite ^/launcher/(.*) /$1 break;
            proxy_pass http://launcher_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── WebSocket Service (/ws/) ──────────────────────────
        location /ws/ {
            rewrite ^/ws/(.*) /$1 break;
            proxy_pass http://ws_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # ── Asset Service (/assets/) ──────────────────────────
        location /assets/ {
            rewrite ^/assets/(.*) /$1 break;
            proxy_pass http://asset_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 100M;
        }

        # ── Uptime Kuma (/status/) ────────────────────────────
        location /status/ {
            rewrite ^/status/(.*) /$1 break;
            proxy_pass http://uptime_kuma;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
