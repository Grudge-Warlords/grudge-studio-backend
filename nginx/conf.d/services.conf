# ─────────────────────────────────────────────
# ws.grudge-studio.com  →  grudge-headless WebSocket
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name ws.grudge-studio.com ws.grudgestudio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ws.grudge-studio.com ws.grudgestudio.com;

    ssl_certificate     /etc/letsencrypt/live/ws.grudge-studio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ws.grudge-studio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass          http://grudge-headless:7777;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_read_timeout  86400;
    }
}
