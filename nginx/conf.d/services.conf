# ─────────────────────────────────────────────
# id.grudge-studio.com  →  grudge-id service
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name id.grudge-studio.com id.grudgestudio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name id.grudge-studio.com id.grudgestudio.com;

    ssl_certificate     /etc/letsencrypt/live/id.grudge-studio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/id.grudge-studio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://grudge-id:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

