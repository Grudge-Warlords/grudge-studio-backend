<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRUDGE ID — Sign In</title>
<meta name="description" content="Sign in to your Grudge Studio account. Access all GRUDGE games and services with one identity.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@700;900&family=Spectral+SC:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://js.puter.com/v2/"></script>
<style>
:root {
  --bg: hsl(225 30% 8%);
  --card: hsl(225 25% 12%);
  --surface: hsl(225 25% 15%);
  --muted-bg: hsl(225 20% 18%);
  --input-bg: hsl(225 25% 15%);
  --text: hsl(45 30% 90%);
  --text-muted: hsl(45 15% 60%);
  --text-dim: hsl(45 10% 45%);
  --gold: hsl(43 85% 55%);
  --gold-light: hsl(43 90% 70%);
  --gold-dark: hsl(43 70% 35%);
  --border: hsl(43 60% 30%);
  --border-dim: hsl(225 15% 22%);
  --green: hsl(142 71% 45%);
  --red: hsl(0 70% 50%);
  --discord: #5865F2;
  --font-heading: 'Cinzel Decorative', 'Cinzel', serif;
  --font-body: 'Spectral SC', 'Inter', serif;
  --font-ui: 'Inter', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
body {
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem;
  background: radial-gradient(ellipse at 50% 0%, hsla(43, 70%, 40%, 0.08) 0%, transparent 60%), var(--bg);
}
a { color: var(--gold); text-decoration: none; } a:hover { color: var(--gold-light); }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; opacity: 0.08;
  background-image: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGRlZnM+PHBhdHRlcm4gaWQ9ImciIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTSA2MCAwIEwgMCAwIDAgNjAiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLXdpZHRoPSIwLjUiLz48L3BhdHRlcm4+PC9kZWZzPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9InVybCgjZykiLz48L3N2Zz4=");
}

.auth-container { width: 100%; max-width: 440px; position: relative; z-index: 1; }

.brand-header { text-align: center; margin-bottom: 1.75rem; }
.brand-logo { width: 72px; height: 72px; border-radius: 14px; border: 2px solid var(--border); box-shadow: 0 0 30px hsla(43,70%,45%,.15); margin: 0 auto 0.75rem; background: var(--surface); display: flex; align-items: center; justify-content: center; }
.brand-logo svg { width: 44px; height: 44px; }
.brand-title { font-family: var(--font-heading); font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 0.06em; }
.brand-sub { font-family: var(--font-ui); font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.15rem; }

.auth-card { background: var(--card); border: 1px solid var(--border-dim); border-radius: 14px; padding: 1.75rem; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.gold-bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark)); }

/* Logged-in user card */
.user-panel { display: none; }
.user-panel.show { display: block; }
.user-row { display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 44px; height: 44px; border-radius: 10px; background: var(--surface); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 1.1rem; color: var(--gold); flex-shrink: 0; overflow: hidden; }
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { font-family: var(--font-heading); font-size: 0.95rem; color: var(--gold); }
.user-id { font-family: var(--font-ui); font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.04em; margin-top: 1px; }
.user-meta { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
.user-badge { font-family: var(--font-ui); font-size: 0.65rem; padding: 3px 8px; border-radius: 4px; background: hsla(43,70%,40%,.1); border: 1px solid var(--border-dim); color: var(--text-muted); }
.btn-logout { margin-left: auto; font-family: var(--font-ui); font-size: 0.72rem; color: var(--text-dim); background: none; border: 1px solid var(--border-dim); border-radius: 6px; padding: 4px 12px; cursor: pointer; transition: .2s; }
.btn-logout:hover { color: var(--red); border-color: var(--red); }

.continue-btn { width: 100%; margin-top: 1rem; padding: 0.75rem; font-family: var(--font-heading); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; color: var(--bg); background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark)); border: none; border-radius: 8px; cursor: pointer; transition: opacity .2s; box-shadow: 0 2px 12px hsla(43,70%,45%,.3); text-decoration: none; display: block; text-align: center; }
.continue-btn:hover { opacity: 0.9; }

/* Login panel */
.login-panel {}
.login-panel.hide { display: none; }

.gilded-button { width: 100%; padding: 0.75rem 1.25rem; font-family: var(--font-heading); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; color: var(--bg); background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark)); border: none; border-radius: 8px; cursor: pointer; transition: opacity .2s, transform .1s; box-shadow: 0 2px 12px hsla(43,70%,45%,.3); }
.gilded-button:hover { opacity: 0.9; } .gilded-button:active { transform: scale(0.98); } .gilded-button:disabled { opacity: 0.4; cursor: not-allowed; }

.provider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.75rem; }
.provider-btn { display: flex; align-items: center; gap: 8px; padding: 0.7rem 0.85rem; font-family: var(--font-ui); font-size: 0.8rem; font-weight: 500; color: var(--text); background: var(--surface); border: 1px solid var(--border-dim); border-radius: 8px; cursor: pointer; transition: .2s; }
.provider-btn:hover { background: var(--muted-bg); border-color: var(--border); }
.provider-btn .icon { font-size: 1.1rem; line-height: 1; width: 20px; text-align: center; }
.provider-btn.discord { border-color: hsla(235,86%,65%,.3); }
.provider-btn.discord:hover { background: hsla(235,86%,65%,.1); border-color: var(--discord); }

.provider-btn-full { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0.75rem; font-family: var(--font-ui); font-size: 0.85rem; font-weight: 600; color: #fff; background: var(--discord); border: none; border-radius: 8px; cursor: pointer; transition: .2s; margin-bottom: 0.75rem; }
.provider-btn-full:hover { background: #4752c4; }
.provider-btn-full svg { flex-shrink: 0; }

.auth-divider { display: flex; align-items: center; gap: 0.75rem; margin: 1rem 0; font-family: var(--font-ui); font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border-dim); }

.login-tabs { display: flex; margin-bottom: 1rem; }
.login-tab { flex: 1; padding: 0.55rem; text-align: center; font-family: var(--font-heading); font-size: 0.7rem; letter-spacing: 0.06em; color: var(--text-dim); background: rgba(0,0,0,.2); border: 1px solid var(--border-dim); cursor: pointer; transition: .2s; }
.login-tab:first-child { border-radius: 6px 0 0 6px; } .login-tab:last-child { border-radius: 0 6px 6px 0; }
.login-tab.active { color: var(--gold); border-color: var(--border); background: hsla(43,70%,40%,.06); }
.tab-panel { display: none; } .tab-panel.active { display: block; }

.input-group { margin-bottom: 0.75rem; }
.input-group label { display: block; font-family: var(--font-ui); font-size: 0.72rem; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.input-group input { width: 100%; padding: 0.6rem 0.8rem; font-family: var(--font-ui); font-size: 0.88rem; color: var(--text); background: var(--input-bg); border: 1px solid var(--border-dim); border-radius: 8px; outline: none; transition: border-color .2s; }
.input-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px hsla(43,85%,55%,.12); }
.input-group input::placeholder { color: var(--text-dim); }
.inline-row { display: flex; gap: 0.5rem; } .inline-row > * { flex: 1; }

.dark-button { width: 100%; padding: 0.65rem 1rem; font-family: var(--font-ui); font-size: 0.82rem; font-weight: 500; color: var(--text); background: var(--surface); border: 1px solid var(--border-dim); border-radius: 8px; cursor: pointer; transition: background .2s, border-color .2s; }
.dark-button:hover { background: var(--muted-bg); border-color: var(--border); }

.msg { display: none; margin-top: 0.75rem; padding: 0.6rem 0.85rem; border-radius: 8px; font-family: var(--font-ui); font-size: 0.8rem; text-align: center; }
.msg.ok { display: block; color: var(--green); background: hsla(142,71%,45%,.08); border: 1px solid hsla(142,71%,45%,.25); }
.msg.err { display: block; color: hsl(0,80%,70%); background: hsla(0,60%,30%,.15); border: 1px solid hsla(0,60%,40%,.25); }

.guest-link { display: block; text-align: center; margin-top: 0.75rem; font-family: var(--font-ui); font-size: 0.75rem; color: var(--text-dim); cursor: pointer; transition: .2s; border: none; background: none; width: 100%; }
.guest-link:hover { color: var(--text-muted); }

.auth-footer { text-align: center; margin-top: 1rem; font-family: var(--font-ui); font-size: 0.72rem; color: var(--text-dim); }
.auth-footer a { color: var(--text-muted); } .auth-footer a:hover { color: var(--gold); }

.device-link { display: block; text-align: center; margin-top: 0.5rem; font-family: var(--font-ui); font-size: 0.72rem; color: var(--text-dim); }
.device-link:hover { color: var(--gold); }

.loading-overlay { display: none; position: absolute; inset: 0; background: hsla(225,30%,8%,.85); z-index: 10; align-items: center; justify-content: center; flex-direction: column; gap: 0.75rem; border-radius: 14px; }
.loading-overlay.show { display: flex; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border-dim); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(--font-ui); font-size: 0.82rem; color: var(--text-muted); }
</style>
</head>
<body>
<div class="auth-container">
  <div class="brand-header">
    <div class="brand-logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 20L24 12L32 20V36H28V27H20V36H16V20Z" fill="url(#gld)"/>
        <circle cx="24" cy="23" r="3.5" fill="hsl(225,30%,8%)"/>
        <defs><linearGradient id="gld" x1="16" y1="12" x2="32" y2="36"><stop stop-color="#e8cc66"/><stop offset="1" stop-color="#8c7420"/></linearGradient></defs>
      </svg>
    </div>
    <div class="brand-title">GRUDGE ID</div>
    <div class="brand-sub">Identity & Authentication</div>
  </div>

  <div class="auth-card">
    <div class="gold-bar"></div>
    <div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text" id="loading-text">Signing in…</div></div>

    <!-- Logged-in state -->
    <div class="user-panel" id="user-panel">
      <div class="user-row">
        <div class="user-avatar" id="user-avatar">⚔</div>
        <div>
          <div class="user-name" id="user-name"></div>
          <div class="user-id" id="user-gid"></div>
        </div>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
      <div class="user-meta" id="user-meta"></div>
      <a class="continue-btn" id="continue-btn" href="https://grudgewarlords.com">CONTINUE TO GAME ⚔</a>
    </div>

    <!-- Login state -->
    <div class="login-panel" id="login-panel">
      <!-- Discord primary -->
      <button class="provider-btn-full" onclick="loginWith('discord')">
        <svg width="20" height="15" viewBox="0 0 71 55" fill="white"><path d="M60.1 4.9A58.5 58.5 0 0 0 45.4.2a.2.2 0 0 0-.2.1 40.8 40.8 0 0 0-1.8 3.7 54 54 0 0 0-16.2 0A37.4 37.4 0 0 0 25.4.3a.2.2 0 0 0-.2-.1A58.4 58.4 0 0 0 10.5 5a.2.2 0 0 0-.1.1C1.5 18.7-.9 32 .3 45.1v.1a58.8 58.8 0 0 0 17.9 9 .2.2 0 0 0 .3-.1 42 42 0 0 0 3.6-5.9.2.2 0 0 0-.1-.3 38.8 38.8 0 0 1-5.5-2.6.2.2 0 0 1 0-.4l1.1-.9a.2.2 0 0 1 .2 0 42 42 0 0 0 35.6 0 .2.2 0 0 1 .2 0l1.1.9a.2.2 0 0 1 0 .3 36.4 36.4 0 0 1-5.5 2.7.2.2 0 0 0-.1.3 47.2 47.2 0 0 0 3.6 5.8.2.2 0 0 0 .3.1A58.6 58.6 0 0 0 71 45.2v-.1C72.4 30.1 68.4 17 60.2 5a.2.2 0 0 0-.1 0zM23.7 37a6.8 6.8 0 0 1-6.3-7 6.7 6.7 0 0 1 6.3-7c3.4 0 6.3 3.1 6.2 7a6.7 6.7 0 0 1-6.2 7zm23.2 0a6.8 6.8 0 0 1-6.3-7 6.7 6.7 0 0 1 6.3-7c3.4 0 6.4 3.1 6.3 7a6.8 6.8 0 0 1-6.3 7z"/></svg>
        Sign in with Discord
      </button>

      <!-- Other providers -->
      <div class="provider-grid">
        <button class="provider-btn" onclick="loginWith('google')"><span class="icon">G</span>Google</button>
        <button class="provider-btn" onclick="loginWith('github')"><span class="icon">⬡</span>GitHub</button>
        <button class="provider-btn" onclick="loginWithPuter()"><span class="icon">⚔</span>Puter Cloud</button>
        <button class="provider-btn" onclick="loginWith('wallet')"><span class="icon">🔗</span>Wallet</button>
      </div>

      <div class="auth-divider"><span>or</span></div>

      <!-- Username / Password tabs -->
      <div class="login-tabs">
        <div class="login-tab active" onclick="showTab(this,'creds')">Sign In</div>
        <div class="login-tab" onclick="showTab(this,'register')">Create Account</div>
      </div>

      <div class="tab-panel active" id="tab-creds">
        <div class="input-group"><label for="login-id">Username / Email / Grudge ID</label><input type="text" id="login-id" placeholder="warlord123" autocomplete="username"></div>
        <div class="input-group"><label for="login-pw">Password</label><input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="gilded-button" onclick="loginWithCreds()" id="creds-btn">SIGN IN</button>
      </div>

      <div class="tab-panel" id="tab-register">
        <div class="input-group"><label for="reg-user">Username</label><input type="text" id="reg-user" placeholder="WarriorKing" autocomplete="off"></div>
        <div class="inline-row">
          <div class="input-group"><label for="reg-email">Email <span style="text-transform:none;font-weight:400;color:var(--text-dim)">(optional)</span></label><input type="email" id="reg-email" placeholder="you@mail.com" autocomplete="email"></div>
          <div class="input-group"><label for="reg-pw">Password</label><input type="password" id="reg-pw" placeholder="••••••" autocomplete="new-password"></div>
        </div>
        <button class="dark-button" onclick="registerAccount()" id="reg-btn" style="color:var(--gold);border-color:var(--border)">CREATE ACCOUNT</button>
      </div>

      <button class="guest-link" onclick="loginAsGuest()">⚡ Continue as Guest</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <a class="device-link" href="/device">Pair a GRUDA Node device →</a>
  <div class="auth-footer">
    Your GRUDGE ID works across all GRUDGE games and services.<br>
    <a href="/privacy">Privacy</a> · <a href="/tos">Terms</a> · <a href="https://grudge-studio.com">grudge-studio.com</a>
  </div>
</div>

<script>
(function() {
  'use strict';
  var ID = location.origin; // https://id.grudge-studio.com

  // Where to send the user after auth — from ?redirect_uri= or default
  var params = new URLSearchParams(location.search);
  var redirectUri = params.get('redirect_uri') || params.get('return') || null;

  function showLoading(text) { var el = document.getElementById('loading'); el.classList.add('show'); document.getElementById('loading-text').textContent = text || 'Signing in…'; }
  function hideLoading() { document.getElementById('loading').classList.remove('show'); }
  function showMsg(t, ok) { var m = document.getElementById('msg'); m.textContent = t; m.className = 'msg ' + (ok ? 'ok' : 'err'); }
  function clearMsg() { document.getElementById('msg').className = 'msg'; document.getElementById('msg').style.display = ''; }

  // ── Token / user storage ──────────────────────────────────────
  function getToken() { return localStorage.getItem('grudge_auth_token'); }
  function getUser() { try { return JSON.parse(localStorage.getItem('grudge_user') || 'null'); } catch { return null; } }

  function storeAuth(d) {
    if (d.token) localStorage.setItem('grudge_auth_token', d.token);
    if (d.user) localStorage.setItem('grudge_user', JSON.stringify(d.user));
    if (d.grudgeId || d.grudge_id) localStorage.setItem('grudge_id', d.grudgeId || d.grudge_id);
    if (d.username) localStorage.setItem('grudge_username', d.username);
    // Cross-compat keys for other frontends
    if (d.token) localStorage.setItem('grudge_session_token', d.token);
  }

  // ── After successful auth ─────────────────────────────────────
  function afterAuth() {
    renderState();
    if (redirectUri) {
      // Auto-redirect back to calling app with token
      var sep = redirectUri.indexOf('?') > -1 ? '&' : '?';
      var token = getToken();
      var gid = localStorage.getItem('grudge_id') || '';
      setTimeout(function() {
        location.href = redirectUri + sep + 'token=' + encodeURIComponent(token) + '&grudge_id=' + encodeURIComponent(gid);
      }, 600);
    }
  }

  // ── Render logged-in / logged-out ─────────────────────────────
  function renderState() {
    var t = getToken(), u = getUser();
    var loggedIn = !!(t && u);
    document.getElementById('login-panel').className = loggedIn ? 'login-panel hide' : 'login-panel';
    document.getElementById('user-panel').className = loggedIn ? 'user-panel show' : 'user-panel';

    if (loggedIn) {
      document.getElementById('user-name').textContent = u.displayName || u.username || 'Warlord';
      var gid = (u.grudgeId || localStorage.getItem('grudge_id') || '').slice(0, 8).toUpperCase();
      document.getElementById('user-gid').textContent = gid ? 'GRUDGE-' + gid : '';

      // Avatar
      var avatarEl = document.getElementById('user-avatar');
      if (u.avatarUrl) {
        avatarEl.innerHTML = '<img src="' + u.avatarUrl + '" alt="avatar">';
      } else {
        avatarEl.textContent = (u.username || 'W')[0].toUpperCase();
      }

      // Badges
      var meta = document.getElementById('user-meta');
      meta.innerHTML = '';
      if (u.isGuest) meta.innerHTML += '<span class="user-badge">Guest</span>';
      if (u.discordId) meta.innerHTML += '<span class="user-badge">Discord</span>';
      if (u.walletAddress) meta.innerHTML += '<span class="user-badge">Wallet</span>';
      if (u.faction) meta.innerHTML += '<span class="user-badge">' + u.faction + '</span>';

      // Continue button destination
      var btn = document.getElementById('continue-btn');
      btn.href = redirectUri || 'https://grudgewarlords.com';
      if (redirectUri) {
        try { btn.textContent = 'CONTINUE TO ' + new URL(redirectUri).hostname.toUpperCase() + ' ⚔'; } catch {}
      }
    }
    hideLoading();
  }

  // ── OAuth redirect providers ──────────────────────────────────
  window.loginWith = function(provider) {
    if (provider === 'wallet') {
      // Wallet auth handled separately
      showMsg('Wallet login coming soon — use another method.', false);
      return;
    }
    // Build the redirect_uri to come back here after OAuth
    var returnHere = location.origin + location.pathname + (redirectUri ? '?redirect_uri=' + encodeURIComponent(redirectUri) : '');
    location.href = ID + '/auth/' + provider + '?redirect_uri=' + encodeURIComponent(returnHere);
  };

  // ── Puter Cloud login ─────────────────────────────────────────
  window.loginWithPuter = async function() {
    showLoading('Connecting Puter Cloud…');
    try {
      var u = await puter.auth.signIn();
      if (!u) { hideLoading(); return; }
      var r = await fetch(ID + '/auth/puter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ puterUuid: u.uuid, puterUsername: u.username })
      });
      var d = await r.json();
      if (r.ok && d.token) { storeAuth(d); showMsg('Signed in!', true); afterAuth(); }
      else { showMsg(d.error || 'Login failed', false); hideLoading(); }
    } catch (e) {
      if (e.message !== 'Cancelled') showMsg('Error: ' + e.message, false);
      hideLoading();
    }
  };

  // ── Username/password login ───────────────────────────────────
  window.loginWithCreds = async function() {
    var id = document.getElementById('login-id').value.trim();
    var pw = document.getElementById('login-pw').value;
    if (!id || !pw) { showMsg('Enter username and password.', false); return; }
    var btn = document.getElementById('creds-btn');
    btn.disabled = true; btn.textContent = 'SIGNING IN…';
    try {
      var r = await fetch(ID + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifier: id, password: pw })
      });
      var d = await r.json();
      if (r.ok && d.token) { storeAuth(d); showMsg('Signed in!', true); afterAuth(); }
      else showMsg(d.error || 'Login failed', false);
    } catch { showMsg('Connection error', false); }
    btn.disabled = false; btn.textContent = 'SIGN IN';
  };

  // ── Register ──────────────────────────────────────────────────
  window.registerAccount = async function() {
    var u = document.getElementById('reg-user').value.trim();
    var e = document.getElementById('reg-email').value.trim();
    var p = document.getElementById('reg-pw').value;
    if (!u || !p) { showMsg('Username and password required.', false); return; }
    var btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'CREATING…';
    try {
      var r = await fetch(ID + '/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, email: e || undefined, password: p })
      });
      var d = await r.json();
      if (r.ok && d.token) { storeAuth(d); showMsg('Account created!', true); afterAuth(); }
      else showMsg(d.error || 'Registration failed', false);
    } catch { showMsg('Connection error', false); }
    btn.disabled = false; btn.textContent = 'CREATE ACCOUNT';
  };

  // ── Guest login ───────────────────────────────────────────────
  window.loginAsGuest = async function() {
    showLoading('Creating guest account…');
    var did = (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2));
    try {
      var r = await fetch(ID + '/auth/guest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deviceId: did })
      });
      var d = await r.json();
      if (r.ok && d.token) { storeAuth(d); showMsg('Guest account ready!', true); afterAuth(); }
      else { showMsg(d.error || 'Guest login failed', false); hideLoading(); }
    } catch { showMsg('Connection error', false); hideLoading(); }
  };

  // ── Logout ────────────────────────────────────────────────────
  window.logout = function() {
    fetch(ID + '/auth/logout', { method: 'POST', headers: { Authorization: 'Bearer ' + getToken() } }).catch(function() {});
    ['grudge_auth_token','grudge_user','grudge_id','grudge_username','grudge_session_token','grudge-session'].forEach(function(k) { localStorage.removeItem(k); });
    location.reload();
  };

  // ── Tab switching ─────────────────────────────────────────────
  window.showTab = function(el, name) {
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.login-tab').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById('tab-' + name).classList.add('active');
    el.classList.add('active');
  };

  // ── Init: check for returning OAuth token or existing session ─
  document.addEventListener('DOMContentLoaded', function() {
    var p = new URLSearchParams(location.search);
    var incomingToken = p.get('token') || p.get('sso_token');
    if (incomingToken) {
      showLoading('Verifying session…');
      localStorage.setItem('grudge_auth_token', incomingToken);
      // Fetch full user profile
      fetch(ID + '/auth/user', { headers: { Authorization: 'Bearer ' + incomingToken } })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(u) {
          if (u) {
            localStorage.setItem('grudge_user', JSON.stringify(u));
            localStorage.setItem('grudge_id', u.grudgeId || '');
            localStorage.setItem('grudge_username', u.username || '');
          }
          // Clean URL
          var clean = location.pathname;
          if (redirectUri) clean += '?redirect_uri=' + encodeURIComponent(redirectUri);
          history.replaceState({}, '', clean);
          afterAuth();
        })
        .catch(function() { hideLoading(); renderState(); });
      return;
    }

    if (p.get('sso_required') === 'true') {
      history.replaceState({}, '', location.pathname + (redirectUri ? '?redirect_uri=' + encodeURIComponent(redirectUri) : ''));
    }

    // Check existing session
    var token = getToken();
    if (token) {
      showLoading('Checking session…');
      fetch(ID + '/auth/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: token }) })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.valid) {
            localStorage.removeItem('grudge_auth_token');
            localStorage.removeItem('grudge_user');
          }
          renderState();
        })
        .catch(function() { renderState(); });
    } else {
      renderState();
    }

    // Enter key on password fields
    document.getElementById('login-pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') loginWithCreds(); });
    document.getElementById('reg-pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') registerAccount(); });
  });
})();
</script>
</body>
</html>
