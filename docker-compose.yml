version: "3.9"

networks:
  grudge-net:
    driver: bridge
  # `coolify` is only used by the legacy Traefik routers below.
  # New public ingress goes through cloudflared → grudge-net.
  # Keep this external declaration so older services still start
  # if the coolify network exists; otherwise set COOLIFY_NETWORK=false
  # or drop the network references on each service.
  coolify:
    external: true

volumes:
  mysql-data:
  redis-data:
  server-data:
  kuma-data:

# ── Shared CORS origins (DRY) ──────────────────────────────────
# All externally-exposed services share this default.
# Override per-env by setting CORS_ORIGINS in .env
x-cors-origins: &cors-origins
  CORS_ORIGINS: ${CORS_ORIGINS:-https://grudgewarlords.com,https://www.grudgewarlords.com,https://grudge-studio.com,https://grudgestudio.com,https://grudge-platform.vercel.app,https://grudgeplatform.com,https://www.grudgeplatform.com,https://grudachain.grudgestudio.com,https://grudachain.grudge-studio.com,https://grudachain-rho.vercel.app,https://dash.grudge-studio.com,https://warlord-crafting-suite.vercel.app,https://gdevelop-assistant.vercel.app,https://gruda-wars.vercel.app,https://grudge-engine-web.vercel.app,https://starwaygruda-webclient-as2n.vercel.app,https://app.puter.com,https://molochdagod.github.io}

services:

  # ─────────────────────────────────────────
  # GRUDGE ID — Unified Identity Service
  # ─────────────────────────────────────────
  grudge-id:
    build: ./services/grudge-id
    container_name: grudge-id
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@grudge-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-https://id.grudge-studio.com/auth/discord/callback}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://id.grudge-studio.com/auth/google/callback}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-https://id.grudge-studio.com/auth/github/callback}
      WEB3AUTH_CLIENT_ID: ${WEB3AUTH_CLIENT_ID}
      WALLET_SERVICE_URL: http://wallet-service:3002
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      CF_TURNSTILE_SECRET_KEY: ${CF_TURNSTILE_SECRET_KEY}
      CF_TURNSTILE_SITE_KEY: ${CF_TURNSTILE_SITE_KEY}
      AUTH_FRONTEND_URL: https://grudgewarlords.com/auth
      <<: *cors-origins
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Public ingress now via cloudflared (see `cloudflared` service
    # below). Traefik labels kept commented for reference/rollback.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.grudge-id.rule=Host(`id.grudge-studio.com`)"
    #   - "traefik.http.routers.grudge-id.entrypoints=https"
    #   - "traefik.http.routers.grudge-id.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.grudge-id.loadbalancer.server.port=3001"
    #   - "traefik.docker.network=coolify"
    networks:
      - grudge-net

  # ─────────────────────────────────────────
  # WALLET SERVICE
  # ─────────────────────────────────────────
  wallet-service:
    build: ./services/wallet-service
    container_name: wallet-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      WALLET_MASTER_SEED: ${WALLET_MASTER_SEED}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grudge-net
    # NOTE: wallet-service is NOT exposed externally - internal network only

  # ─────────────────────────────────────────
  # GAME API — GAME_API_GRUDA
  # ─────────────────────────────────────────
  game-api:
    build: ./services/game-api
    container_name: game-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@grudge-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      AI_AGENT_URL: http://ai-agent:3004
      <<: *cors-origins
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Public ingress via cloudflared.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.game-api.rule=Host(`api.grudge-studio.com`)"
    #   - "traefik.http.routers.game-api.entrypoints=https"
    #   - "traefik.http.routers.game-api.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.game-api.loadbalancer.server.port=3003"
    #   - "traefik.docker.network=coolify"
    networks:
      - grudge-net

  # ─────────────────────────────────────────
  # AI AGENT — Dynamic Missions, Companions, Faction Intel
  # ─────────────────────────────────────────
  ai-agent:
    build: ./services/ai-agent
    container_name: ai-agent
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@grudge-redis:6379
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grudge-net
    # NOTE: ai-agent is NOT exposed externally — internal network only

  # ─────────────────────────────────────────────
  # ACCOUNT API — Profiles, Social, Achievements, Puter Cloud
  # ─────────────────────────────────────────────
  account-api:
    build: ./services/account-api
    container_name: account-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_KEY: ${OBJECT_STORAGE_KEY}
      OBJECT_STORAGE_SECRET: ${OBJECT_STORAGE_SECRET}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-auto}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL}
      <<: *cors-origins
    depends_on:
      mysql:
        condition: service_healthy
    # Public ingress via cloudflared.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.account-api.rule=Host(`account.grudge-studio.com`)"
    #   - "traefik.http.routers.account-api.entrypoints=https"
    #   - "traefik.http.routers.account-api.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.account-api.loadbalancer.server.port=3005"
    #   - "traefik.docker.network=coolify"
    networks:
      - grudge-net

  # ─────────────────────────────────────────────
  # LAUNCHER API — Version Manifest, Computer Registration, Launch Tokens
  # ─────────────────────────────────────────────
  launcher-api:
    build: ./services/launcher-api
    container_name: launcher-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3006
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LAUNCH_TOKEN_SECRET: ${LAUNCH_TOKEN_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_KEY: ${OBJECT_STORAGE_KEY}
      OBJECT_STORAGE_SECRET: ${OBJECT_STORAGE_SECRET}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-auto}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL}
      <<: *cors-origins
    depends_on:
      mysql:
        condition: service_healthy
    # Public ingress via cloudflared.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.launcher-api.rule=Host(`launcher.grudge-studio.com`)"
    #   - "traefik.http.routers.launcher-api.entrypoints=https"
    #   - "traefik.http.routers.launcher-api.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.launcher-api.loadbalancer.server.port=3006"
    #   - "traefik.docker.network=coolify"
    networks:
      - grudge-net

  # ─────────────────────────────────────────────
  # ASSET SERVICE — Upload, metadata, conversions, export bundles
  # ─────────────────────────────────────────────
  asset-service:
    build: ./services/asset-service
    container_name: asset-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3008
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_KEY: ${OBJECT_STORAGE_KEY}
      OBJECT_STORAGE_SECRET: ${OBJECT_STORAGE_SECRET}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-auto}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL}
      <<: *cors-origins
    depends_on:
      mysql:
        condition: service_healthy
    # Public ingress via cloudflared.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.asset-service.rule=Host(`assets-api.grudge-studio.com`)"
    #   - "traefik.http.routers.asset-service.entrypoints=https"
    #   - "traefik.http.routers.asset-service.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.asset-service.loadbalancer.server.port=3008"
    #   - "traefik.docker.network=coolify"
    networks:
      - grudge-net

  # ─────────────────────────────────────────────
  # WS SERVICE — Real-time WebSocket (Socket.IO)
  # Namespaces: /game (island rooms), /crew, /global
  # ─────────────────────────────────────────────
  ws-service:
    build: ./services/ws-service
    container_name: ws-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3007
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@grudge-redis:6379
      <<: *cors-origins
    depends_on:
      redis:
        condition: service_healthy
    # Public ingress via cloudflared (Cloudflare natively supports
    # WebSocket upgrades through tunnels — no extra config required).
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.ws-service.rule=Host(`ws.grudge-studio.com`)"
    #   - "traefik.http.routers.ws-service.entrypoints=https"
    #   - "traefik.http.routers.ws-service.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.ws-service.loadbalancer.server.port=3007"
    #   - "traefik.http.services.ws-service.loadbalancer.sticky.cookie=true"
    #   - "traefik.http.services.ws-service.loadbalancer.sticky.cookie.name=grudge_ws"
    #   - "traefik.docker.network=coolify"
    networks:
      - grudge-net

  # ─────────────────────────────────────────────
  # GRUDGE BRIDGE — 3-Node VPS Operations Manager
  # Backups, dumps, SHA verification, deploy orchestration
  # Peers: Windows VPS (Radmin), GrudgeYonko (Radmin)
  # ─────────────────────────────────────────────
  grudge-bridge:
    build: ./services/grudge-bridge
    container_name: grudge-bridge
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      NODE_ROLE: primary
      NODE_NAME: linux-vps
      BRIDGE_API_KEY: ${BRIDGE_API_KEY}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_CONTAINER: grudge-mysql
      R2_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      R2_BUCKET: grudge-assets
      R2_KEY: ${OBJECT_STORAGE_KEY}
      R2_SECRET: ${OBJECT_STORAGE_SECRET}
      PEER_NODES: ${BRIDGE_PEER_NODES:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      COMPOSE_DIR: /opt/grudge-studio-backend
    depends_on:
      mysql:
        condition: service_healthy
    # Public ingress via cloudflared.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.grudge-bridge.rule=Host(`bridge.grudge-studio.com`)"
    #   - "traefik.http.routers.grudge-bridge.entrypoints=https"
    #   - "traefik.http.routers.grudge-bridge.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.grudge-bridge.loadbalancer.server.port=4000"
    #   - "traefik.docker.network=coolify"
    networks:
      - grudge-net

  # ─────────────────────────────────────────────
  # UPTIME KUMA — Self-hosted monitoring dashboard
  # Dashboard: https://status.grudge-studio.com
  # Monitors all service /health endpoints internally
  # Alerts to Discord on downtime
  # ─────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - kuma-data:/app/data
    # Public ingress via cloudflared.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.kuma.rule=Host(`status.grudge-studio.com`)"
    #   - "traefik.http.routers.kuma.entrypoints=https"
    #   - "traefik.http.routers.kuma.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.kuma.loadbalancer.server.port=3001"
    #   - "traefik.docker.network=coolify"
    networks:
      - grudge-net

  # ─────────────────────────────────────────────
  # GRUDGE HEADLESS — Unity Linux Game Server
  # Requires bin/ to be uploaded separately (not in git)
  # Start with: docker compose --profile gameserver up -d grudge-headless
  # ─────────────────────────────────────────────
  grudge-headless:
    build: ./services/grudge-headless
    container_name: grudge-headless
    profiles: ["gameserver"]
    restart: unless-stopped
    ports:
      - "7777:7777/tcp"
      - "7777:7777/udp"
    volumes:
      - server-data:/opt/grudge-server/data
    environment:
      MAX_PLAYERS: ${MAX_PLAYERS:-22}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grudge-net

  # ─────────────────────────────────────────
  # MYSQL — Primary Database
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: grudge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - grudge-net

  # ─────────────────────────────────────────
  # REDIS — Cache & Session Store
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grudge-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grudge-net

  # ─────────────────────────────────────────────
  # DEV GATEWAY — Local nginx reverse proxy
  # All services via localhost:8080/{prefix}/
  # Only starts with: --profile dev
  # ─────────────────────────────────────────────
  dev-gateway:
    image: nginx:alpine
    container_name: dev-gateway
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/dev/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - grudge-id
      - game-api
      - account-api
      - uptime-kuma
    networks:
      - grudge-net

  # ─────────────────────────────────────────────
  # CLOUDFLARE TUNNEL — Public ingress replacement for Traefik
  # ─────────────────────────────────────────────
  # Mirrors the pattern used by grudge-backend/docker-compose.yml.
  # Outbound-only — no inbound ports need to be open on the VPS.
  #
  # SETUP (one-time):
  #   1. https://one.dash.cloudflare.com → Networks → Tunnels
  #   2. Create tunnel named "grudge-studio"
  #   3. Copy the connector install token → .env as CLOUDFLARE_TUNNEL_TOKEN
  #   4. Under Public Hostnames, add the entries from cloudflared/config.yml
  #      (id/api/account/launcher/assets-api/ws/status/bridge)
  #   5. docker compose up -d cloudflared
  #
  # See deploy/MIGRATE-TO-CLOUDFLARE-TUNNEL.md for full runbook.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: grudge-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required — see deploy/MIGRATE-TO-CLOUDFLARE-TUNNEL.md}
    depends_on:
      - grudge-id
      - game-api
      - account-api
      - launcher-api
      - asset-service
      - ws-service
      - grudge-bridge
      - uptime-kuma
    networks:
      - grudge-net

  # NOTE: Traefik/Coolify-managed public ingress is replaced by cloudflared above.
  # Traefik labels on individual services are commented out but preserved for rollback.
