version: "3.9"

networks:
  grudge-net:
    driver: bridge
  coolify:
    external: true

volumes:
  mysql-data:
  redis-data:
  server-data:

services:

  # ─────────────────────────────────────────
  # GRUDGE ID — Unified Identity Service
  # ─────────────────────────────────────────
  grudge-id:
    build: ./services/grudge-id
    container_name: grudge-id
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      WEB3AUTH_CLIENT_ID: ${WEB3AUTH_CLIENT_ID}
      WALLET_SERVICE_URL: http://wallet-service:3002
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://grudgewarlords.com,https://grudgestudio.com,https://grudachain.grudgestudio.com}
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grudge-id.rule=Host(`id.grudgestudio.com`)"
      - "traefik.http.routers.grudge-id.entrypoints=websecure"
      - "traefik.http.routers.grudge-id.tls.certresolver=letsencrypt"
      - "traefik.http.services.grudge-id.loadbalancer.server.port=3001"
      - "traefik.docker.network=coolify"
    networks:
      - grudge-net
      - coolify

  # ─────────────────────────────────────────
  # WALLET SERVICE
  # ─────────────────────────────────────────
  wallet-service:
    build: ./services/wallet-service
    container_name: wallet-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      WALLET_MASTER_SEED: ${WALLET_MASTER_SEED}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grudge-net
    # NOTE: wallet-service is NOT exposed externally - internal network only

  # ─────────────────────────────────────────
  # GAME API — GAME_API_GRUDA
  # ─────────────────────────────────────────
  game-api:
    build: ./services/game-api
    container_name: game-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      AI_AGENT_URL: http://ai-agent:3004
      CORS_ORIGINS: ${CORS_ORIGINS:-https://grudgewarlords.com,https://grudgestudio.com,https://grudachain.grudgestudio.com}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.game-api.rule=Host(`api.grudgestudio.com`)"
      - "traefik.http.routers.game-api.entrypoints=websecure"
      - "traefik.http.routers.game-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.game-api.loadbalancer.server.port=3003"
      - "traefik.docker.network=coolify"
    networks:
      - grudge-net
      - coolify

  # ─────────────────────────────────────────
  # AI AGENT — Dynamic Missions, Companions, Faction Intel
  # ─────────────────────────────────────────
  ai-agent:
    build: ./services/ai-agent
    container_name: ai-agent
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grudge-net
    # NOTE: ai-agent is NOT exposed externally — internal network only

  # ─────────────────────────────────────────────
  # ACCOUNT API — Profiles, Social, Achievements, Puter Cloud
  # ─────────────────────────────────────────────
  account-api:
    build: ./services/account-api
    container_name: account-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_KEY: ${OBJECT_STORAGE_KEY}
      OBJECT_STORAGE_SECRET: ${OBJECT_STORAGE_SECRET}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://grudgewarlords.com,https://grudgestudio.com,https://account.grudgestudio.com,https://app.puter.com}
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.account-api.rule=Host(`account.grudgestudio.com`)"
      - "traefik.http.routers.account-api.entrypoints=websecure"
      - "traefik.http.routers.account-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.account-api.loadbalancer.server.port=3005"
      - "traefik.docker.network=coolify"
    networks:
      - grudge-net
      - coolify

  # ─────────────────────────────────────────────
  # LAUNCHER API — Version Manifest, Computer Registration, Launch Tokens
  # ─────────────────────────────────────────────
  launcher-api:
    build: ./services/launcher-api
    container_name: launcher-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3006
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LAUNCH_TOKEN_SECRET: ${LAUNCH_TOKEN_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_KEY: ${OBJECT_STORAGE_KEY}
      OBJECT_STORAGE_SECRET: ${OBJECT_STORAGE_SECRET}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://grudgewarlords.com,https://grudgestudio.com,https://launcher.grudgestudio.com}
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.launcher-api.rule=Host(`launcher.grudgestudio.com`)"
      - "traefik.http.routers.launcher-api.entrypoints=websecure"
      - "traefik.http.routers.launcher-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.launcher-api.loadbalancer.server.port=3006"
      - "traefik.docker.network=coolify"
    networks:
      - grudge-net
      - coolify

  # ─────────────────────────────────────────────
  # GRUDGE HEADLESS — Unity Linux Game Server
  # Requires bin/ to be uploaded separately (not in git)
  # Start with: docker compose --profile gameserver up -d grudge-headless
  # ─────────────────────────────────────────────
  grudge-headless:
    build: ./services/grudge-headless
    container_name: grudge-headless
    profiles: ["gameserver"]
    restart: unless-stopped
    ports:
      - "7777:7777/tcp"
      - "7777:7777/udp"
    volumes:
      - server-data:/opt/grudge-server/data
    environment:
      MAX_PLAYERS: ${MAX_PLAYERS:-22}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grudge-net

  # ─────────────────────────────────────────
  # MYSQL — Primary Database
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: grudge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - grudge-net

  # ─────────────────────────────────────────
  # REDIS — Cache & Session Store
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grudge-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grudge-net

  # NOTE: nginx and certbot removed — Traefik (managed by Coolify) handles TLS + routing
