name = "grudge-r2-cdn"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# Custom domain — set up via Cloudflare dashboard:
#   CNAME assets → grudge-r2-cdn.<account>.workers.dev
routes = [
  { pattern = "assets.grudge-studio.com/*", zone_name = "grudge-studio.com" }
]

# R2 bucket binding
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "grudge-assets"

# KV for rate limiting (optional — create via: npx wrangler kv namespace create "RATE_LIMIT")
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<your-kv-namespace-id>"

[vars]
ALLOWED_ORIGINS = "https://grudge-space-rts.vercel.app,https://starrts.grudge-studio.com,https://grudgewarlords.com,https://grudge-studio.com,http://localhost:5173"
