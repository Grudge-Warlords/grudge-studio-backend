name               = "grudge-r2-cdn"
main               = "index.js"
compatibility_date = "2025-02-04"
account_id         = "ee475864561b02d4588180b8b9acf694"

# ── R2 binding (native — no S3 API key needed for reads) ─────────────────────
[[r2_buckets]]
binding     = "GRUDGE_ASSETS"
bucket_name = "grudge-assets"

# ── KV namespace for rate limiting ───────────────────────────────────────────
# Create before first deploy:
#   npx wrangler kv namespace create "GRUDGE_RATE_LIMIT"
# Copy the returned `id` below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id      = "35be1828b2124f82abdc770293177165"

# ── Environment variables ────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# ── Routes / custom domain ───────────────────────────────────────────────────
# assets.grudge-studio.com CNAME → grudge-r2-cdn.grudge.workers.dev (proxied)
# Route binding tells Cloudflare to run this worker for that hostname.
[[routes]]
pattern = "assets.grudge-studio.com/*"
zone_id = "e8c0c2ee3063f24eb31affddabf9730a"

# Legacy grudgestudio.com (keep until fully migrated)
# [[routes]]
# pattern = "assets.grudgestudio.com/*"
# zone_name = "grudgestudio.com"

# ── Dev preview (local) ──────────────────────────────────────────────────────
# npx wrangler dev  →  http://localhost:8787
# Uses real R2 bucket in preview mode.

# ══════════════════════════════════════════════════════════════════════════════
# STAGING ENVIRONMENT
# Deploy: npx wrangler deploy --env staging
# ══════════════════════════════════════════════════════════════════════════════
[env.staging]
name = "grudge-r2-cdn-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
