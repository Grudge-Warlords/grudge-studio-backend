# ⚠️ DEPRECATED — This Cloudflare Worker dashboard has been replaced by the
# React dashboard at dash.grudge-studio.com (Vercel project: grudge-studio-dash).
# Kept for reference only. Do NOT deploy.
# The health-ping cron worker is separate and remains active.
name               = "grudge-dashboard-DEPRECATED"
main               = "index.js"
compatibility_date = "2025-02-04"
account_id         = "ee475864561b02d4588180b8b9acf694"

[observability]
enabled = true

# ── Custom domain ─────────────────────────────────────────────────────────────
# REMOVED: dash.grudge-studio.com/* — Vercel project `grudge-studio-dash` owns this domain.
# Dashboard worker is accessible via workers.dev URL only (for staging/internal use).

# ── D1 Database (Grudge Studio primary CF data) ───────────────────────────────
[[d1_databases]]
binding      = "DB"
database_name = "grudge-studio-db"
database_id  = "8fcb111b-fcee-4f4e-b0d5-59ad416ee3b9"

# ── R2 Bucket (game assets) ───────────────────────────────────────────────────
[[r2_buckets]]
binding     = "ASSETS"
bucket_name = "grudge-assets"

# ── KV (rate limiting / sessions) ─────────────────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id      = "35be1828b2124f82abdc770293177165"

# ── Cron trigger: sync VPS data to D1/KV every 10 min ────────────────────
[triggers]
crons = ["*/10 * * * *"]

# ── Environment variables (non-secret) ─────────────────────────────────────
[vars]
ENVIRONMENT       = "production"
VPS_IP            = "74.208.155.229"
IDENTITY_API      = "https://id.grudge-studio.com"
GAME_API          = "https://api.grudge-studio.com"
ACCOUNT_API       = "https://account.grudge-studio.com"
LAUNCHER_API      = "https://launcher.grudge-studio.com"
WS_API            = "https://ws.grudge-studio.com"
CDN_URL           = "https://assets.grudge-studio.com"

# ── Secrets (set via wrangler secret put) ─────────────────────────────────────
# wrangler secret put DASH_API_KEY
# → paste your INTERNAL_API_KEY value
# This key gates all dashboard access.

# ══════════════════════════════════════════════════════════════════════════════
# STAGING ENVIRONMENT
# Deploy: npx wrangler deploy --env staging
# ══════════════════════════════════════════════════════════════════════════════
[env.staging]
name = "grudge-dashboard-staging"

[env.staging.vars]
ENVIRONMENT       = "staging"
VPS_IP            = "74.208.155.229"
IDENTITY_API      = "http://74.208.155.229:4001"
GAME_API          = "http://74.208.155.229:4003"
ACCOUNT_API       = "http://74.208.155.229:4004"
LAUNCHER_API      = "http://74.208.155.229:4005"
WS_API            = "http://74.208.155.229:4006"
CDN_URL           = "https://assets.grudge-studio.com"
