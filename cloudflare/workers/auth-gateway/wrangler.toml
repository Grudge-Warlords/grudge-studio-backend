name               = "grudge-auth-gateway"
main               = "index.js"
compatibility_date = "2025-02-04"
account_id         = "ee475864561b02d4588180b8b9acf694"

[observability]
enabled = true

# ── Custom domains ─────────────────────────────────────────────────────────
# Primary route (grudge-studio.com is on Cloudflare)
[[routes]]
pattern = "auth.grudge-studio.com/*"
zone_id = "e8c0c2ee3063f24eb31affddabf9730a"

# Legacy route (enable after grudgestudio.com is added to Cloudflare)
# [[routes]]
# pattern   = "auth.grudgestudio.com/*"
# zone_name = "grudgestudio.com"

# ── KV (shared namespace — sessions, rate limiting, bans) ─────────────────────
[[kv_namespaces]]
binding = "KV"
id      = "35be1828b2124f82abdc770293177165"

# ── Environment variables (non-secret) ─────────────────────────────────────────
[vars]
ENVIRONMENT  = "production"
IDENTITY_API = "https://id.grudge-studio.com"

# ── Secrets (set via wrangler secret put) ──────────────────────────────────────
# wrangler secret put AUTH_INTERNAL_KEY
# → paste your INTERNAL_API_KEY value (same key used by other services)

# ══════════════════════════════════════════════════════════════════════════════
# STAGING ENVIRONMENT
# Deploy: npx wrangler deploy --env staging
# ══════════════════════════════════════════════════════════════════════════════
[env.staging]
name = "grudge-auth-gateway-staging"

[env.staging.vars]
ENVIRONMENT  = "staging"
IDENTITY_API = "http://74.208.155.229:3001"
