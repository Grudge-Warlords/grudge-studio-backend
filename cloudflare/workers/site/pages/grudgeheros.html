  const cm = CLASS_MOD[cls] || CLASS_MOD.Warrior;
  const rm = RACE_MOD[race] || RACE_MOD.Human;

    health: BASE.health + cm.health + rm.health,

  };
}

HEROES.forEach((hero, idx) => {
  hero.walletInfo = HERO_WALLET_DATA[idx] || null;
});

function gbuxChipHTML(wInfo) {
  if (wInfo.gbuxLive !== undefined) {
    const n = wInfo.gbuxLive;
    const fmt = n === 0 ? '0'
      : n >= 1_000_000 ? (n / 1_000_000).toFixed(2) + 'M'
      : n >= 1_000    ? (n / 1_000).toFixed(1) + 'K'
      : n.toFixed(2);
    return `<div class="gbux-chip" title="Live GBUX balance: ${n.toLocaleString()}">◈ ${fmt}</div>`;
  }
  return `<div class="gbux-chip gbux-loading" title="Fetching GBUX balance…">◈ …</div>`;
}

function shortWallet(wallet) {
  if (!wallet) return 'Unassigned';
  return `${wallet.slice(0, 4)}…${wallet.slice(-4)}`;
}

function starsHTML(rarity, size) {
  size = size || 12;
  const cfg = RARITY_CONFIG[rarity] || RARITY_CONFIG.Common;
  let html = '';
  for (let i = 0; i < cfg.stars; i++) {
    html += `<span class="star-icon" style="width:${size}px;height:${size}px;background:${cfg.color};filter:drop-shadow(0 0 2px ${cfg.color}60)"></span>`;
  }
  return html;
}

let filteredHeroes = [...HEROES];
let selectedIndex = -1;
let currentTab = 'lore';

function applyFilters() {
  const race = document.getElementById('filter-race').value;
  const cls = document.getElementById('filter-class').value;
  const faction = document.getElementById('filter-faction').value;
  filteredHeroes = HEROES.filter(h => {
    if (race !== 'All' && h.race !== race) return false;
    if (cls !== 'All' && h.className !== cls) return false;
    if (faction !== 'All' && h.faction !== faction) return false;
    return true;
  });
  document.getElementById('count').textContent = filteredHeroes.length;
  document.getElementById('total').textContent = HEROES.length;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('no-results');
  if (filteredHeroes.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';
  grid.innerHTML = filteredHeroes.map((hero, i) => {
    const fc = FACTION_COLORS[hero.faction] || FACTION_COLORS.Crusade;
    const pkOverride = hero.id === 'pirate_king' ? '#c9a030' : null;
    const borderColor = pkOverride || fc.border;
    const gradient = pkOverride ? 'linear-gradient(135deg, #1a1505 0%, #2a2010 50%, #1a1505 100%)' : fc.gradient;
    const glow = pkOverride ? 'rgba(201,160,48,0.4)' : fc.glow;
    return `<div class="card" style="border:2px solid ${borderColor};box-shadow:0 0 20px ${glow},0 4px 20px rgba(0,0,0,0.5);background:${gradient}" onclick="openModal(${i})">
      <div class="top-line" style="background:linear-gradient(90deg,transparent,${borderColor},transparent)"></div>
      <div class="card-portrait">
        <img src="${ASSET_BASE}hero-portraits/${hero.id}.png" alt="${hero.name}" onerror="this.src='${ASSET_BASE}${hero.portrait}'" />
        <div class="overlay"></div>
        <div class="card-faction-tag" style="color:${hero.factionColor};border:1px solid ${hero.factionColor}40">${hero.faction}</div>
        <div class="card-name-area">
          <div class="card-name">${hero.name}</div>
          <div class="card-title" style="color:${borderColor}">${hero.title}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="stars">${starsHTML(hero.rarity)}</div>
        <div class="stat-bar">
          <div class="stat">${statSVG('health','#22c55e')}<span style="color:#22c55e">${hero.stats.health}</span></div>
          <div class="stat">${statSVG('attack','#ef4444')}<span style="color:#ef4444">${hero.stats.attack}</span></div>
          <div class="stat">${statSVG('defense','#3b82f6')}<span style="color:#3b82f6">${hero.stats.defense}</span></div>
          <div class="stat">${statSVG('speed','#f59e0b')}<span style="color:#f59e0b">${hero.stats.speed}</span></div>
        </div>
        ${hero.walletInfo ? `<div class="wallet-strip">
          <div class="wallet-pill">
            <div class="wallet-label">Wallet</div>
            <div class="wallet-code" title="${hero.walletInfo.wallet}">${shortWallet(hero.walletInfo.wallet)}</div>
          </div>
          ${gbuxChipHTML(hero.walletInfo)}
        </div>` : ''}
        <div class="card-footer">
          <span class="card-meta">${hero.race} ${hero.className}</span>
          <div class="card-abilities">
            ${hero.abilities.slice(0,4).map(a => {
              const c = a.manaCost > 0 ? '#a78bfa' : '#4ade80';
              return `<div class="ability-icon-box" style="background:${borderColor}12;border:1px solid ${borderColor}25" title="${a.name}: ${a.description}${a.manaCost>0?' ('+a.manaCost+' MP)':' (Passive)'}"><img src="${skillSrc(a.icon)}" style="filter:drop-shadow(0 0 2px ${c})" /></div>`;
            }).join('')}
          </div>
        </div>
      </div>
      <div class="bottom-line" style="background:linear-gradient(90deg,transparent,${borderColor},transparent)"></div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  selectedIndex = idx;
  currentTab = 'lore';
  renderModal();
  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.body.style.overflow = '';
  selectedIndex = -1;
}

function navHero(dir) {
  if (selectedIndex < 0) return;
  selectedIndex = (selectedIndex + dir + filteredHeroes.length) % filteredHeroes.length;
  currentTab = 'lore';
  renderModal();
}

function setTab(t) {
  currentTab = t;
  renderModal();
}

  const hero = filteredHeroes[selectedIndex];
  if (!hero) return;
  const fc = FACTION_COLORS[hero.faction] || FACTION_COLORS.Crusade;

  const rarityCfg = RARITY_CONFIG[hero.rarity] || RARITY_CONFIG.Common;

  let contentHTML = '';
  if (currentTab === 'lore') {
    contentHTML = `

        <div class="combat-row"><span class="label">Token Account</span><span class="value" style="font-family:monospace;font-size:11px">${shortWallet(hero.walletInfo.gbuxAta)}</span></div>
      </div>` : ''}
      <div>
        <div class="panel-label">Combat Profile</div>
        <div class="combat-row"><span class="label">Combat Style</span><span class="value">${hero.combatStyle}</span></div>
        <div class="combat-row"><span class="label">Weapons</span><span class="value" style="text-align:right;max-width:180px">${hero.weapons}</span></div>
        <div class="combat-row"><span class="label">Difficulty</span><span style="color:${hero.difficulty==='Expert'?'#ef4444':hero.difficulty==='Advanced'?'#f59e0b':hero.difficulty==='Intermediate'?'#3b82f6':'#22c55e'}">${hero.difficulty}</span></div>
        <div class="combat-row"><span class="label">Primary Attr</span><span style="color:${borderColor};font-weight:700">${hero.primaryAttribute}</span></div>
        <div class="combat-row"><span class="label">Rarity</span><span>${starsHTML(hero.rarity, 14)}</span></div>
      </div>
      <div class="sw-grid">
        <div>
          <div class="panel-label" style="color:#22c55e">Strengths</div>
          <ul class="sw-list">${hero.strengths.map(s => `<li><span style="color:#22c55e">+</span> ${s}</li>`).join('')}</ul>
        </div>
        <div>
          <div class="panel-label" style="color:#ef4444">Weaknesses</div>
          <ul class="sw-list">${hero.weaknesses.map(w => `<li><span style="color:#ef4444">-</span> ${w}</li>`).join('')}</ul>
        </div>
      </div>
    `;
  } else if (currentTab === 'skills') {
    contentHTML = `
      <div style="display:flex;flex-direction:column;gap:8px">
        ${hero.abilities.map(a => {
          const costHTML = a.manaCost > 0
            ? `<span class="ability-cost" style="background:rgba(139,92,246,0.15);color:#a78bfa">${a.manaCost} MP</span>`
            : `<span class="ability-cost" style="background:rgba(34,197,94,0.15);color:#4ade80">Passive</span>`;
          return `<div class="ability-row">
            <div class="ability-icon-lg" style="background:${borderColor}20;border:1px solid ${borderColor}40">
              <img src="${skillSrc(a.icon)}" style="filter:drop-shadow(0 0 2px ${borderColor})" />
            </div>
            <div class="ability-info">
              <div class="ability-header"><span class="ability-name">${a.name}</span>${costHTML}</div>
              <div class="ability-desc">${a.description}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="panel">
        <div class="panel-label">Racial Traits</div>
        ${hero.racialTraits.map(t => `<div class="trait-row"><span class="trait-name" style="font-size:12px">${t.name}</span><span class="trait-effect" style="color:${borderColor}">${t.effect}</span></div>`).join('')}
      </div>
    `;
  }

  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-card" style="border:2px solid ${borderColor};box-shadow:0 0 40px ${glow},0 8px 40px rgba(0,0,0,0.6);background:${gradient}">
      <div class="modal-portrait">
        <img src="${ASSET_BASE}hero-portraits/${hero.id}.png" alt="${hero.name}" onerror="this.src='${ASSET_BASE}${hero.portrait}'" />
        <div class="gradient-bottom"></div>
        <div class="gradient-right"></div>
        <div class="modal-tags">
          <div class="modal-tag" style="border:1px solid ${rarityCfg.color}40"><span style="display:flex;gap:3px">${starsHTML(hero.rarity, 13)}</span></div>
          <span class="modal-tag" style="color:${hero.factionColor};border:1px solid ${hero.factionColor}50">${hero.faction}</span>
        </div>
        <div class="modal-name-area">
          <div class="modal-name">${hero.name}</div>
          <div class="modal-title-text" style="color:${borderColor}">${hero.title}</div>
          <div class="modal-race-info">
            <span style="color:#ccc">${hero.race}</span>
            <span style="color:#888">/</span>
            <span style="color:#ccc">${hero.className}</span>
            <span style="color:#888">/</span>
            <span style="color:${borderColor};font-weight:700">${hero.alignment}</span>
          </div>
        </div>
      </div>
      <div class="modal-right">
        <div class="modal-tabs">
          ${['lore','stats','skills'].map(t => `<button class="modal-tab ${currentTab===t?'active':''}" style="color:${currentTab===t?borderColor:'#888'};border-bottom-color:${currentTab===t?borderColor:'transparent'}" onclick="setTab('${t}')">${t}</button>`).join('')}
        </div>
        <div class="modal-content">${contentHTML}</div>
      </div>
    </div>
  `;
}

document.addEventListener('keydown', e => {
  if (selectedIndex < 0) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') navHero(-1);
  if (e.key === 'ArrowRight') navHero(1);
});

applyFilters();

// ── Live GBUX balance loader ──────────────────────────────────────────────────
async function loadGbuxBalances() {
  const RPC = 'https://api.mainnet-beta.solana.com';
  for (let i = 0; i < HERO_WALLET_DATA.length; i++) {
    const ata = HERO_WALLET_DATA[i].gbuxAta;
    try {
      const res = await fetch(RPC, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: '2.0', id: i, method: 'getTokenAccountBalance', params: [ata] })
      });
      const data = await res.json();
      const val = data?.result?.value;
      HERO_WALLET_DATA[i].gbuxLive = val ? (val.uiAmount ?? 0) : 0;
    } catch (e) {
      HERO_WALLET_DATA[i].gbuxLive = 0;
    }
    // Re-render after every 5 fetches so UI updates incrementally
    if (i % 5 === 4 || i === HERO_WALLET_DATA.length - 1) renderGrid();
    // Small pause between batches to avoid rate limits
    if (i % 5 === 4) await new Promise(r => setTimeout(r, 800));
  }
}

loadGbuxBalances();
</script>
</body>
</html>
