name               = "grudge-studio-site"
main               = "index.js"
compatibility_date = "2025-02-04"
account_id         = "ee475864561b02d4588180b8b9acf694"

[observability]
enabled = true

# ── Custom domain ──────────────────────────────────────────────────────────────
[[routes]]
pattern = "grudge-studio.com/*"
zone_id = "e8c0c2ee3063f24eb31affddabf9730a"

[[routes]]
pattern = "client.grudge-studio.com/*"
zone_id = "e8c0c2ee3063f24eb31affddabf9730a"

[[routes]]
pattern = "wallet.grudge-studio.com/*"
zone_id = "e8c0c2ee3063f24eb31affddabf9730a"

# ── KV namespace for status caching ────────────────────────────────────────────
# Create with:  npx wrangler kv namespace create "STATUS_KV"
# Then paste the returned id below.
[[kv_namespaces]]
binding = "STATUS_KV"
id      = "4831aa73571e4078a648e109bcaaf440"

# ── Cron trigger — refresh health checks every minute ──────────────────────────
[triggers]
crons = ["* * * * *"]

# ── Environment variables ──────────────────────────────────────────────────────
# ── Text module imports for page HTML files ─────────────────────────────────
[[rules]]
type = "Text"
globs = ["pages/*.html"]
fallthrough = true

[vars]
ENVIRONMENT  = "production"
# App Public Key from: Developer Portal → General Information → Public Key
DISCORD_PUBLIC_KEY = "1a6f052732c510496f4c9f342ade62e06c0525d6ed327d37f4480141ca94602a"
IDENTITY_API = "https://id.grudge-studio.com"
GAME_API     = "https://api.grudge-studio.com"
ACCOUNT_API  = "https://account.grudge-studio.com"
LAUNCHER_API = "https://launcher.grudge-studio.com"
WS_API       = "https://ws.grudge-studio.com"
CDN_URL      = "https://assets.grudge-studio.com"
DASH_URL     = "https://dash.grudge-studio.com"
